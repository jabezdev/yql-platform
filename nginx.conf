server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Vite hashed assets — cache forever ───────────────────────────────────
    # Vite appends a content hash to every JS/CSS filename, so these are safe
    # to cache indefinitely (a new deploy produces new filenames).
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Other static files — short cache ─────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA fallback — all routes serve index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached so browsers always fetch the latest
        # entry point after a new deploy.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
